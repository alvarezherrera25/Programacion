<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página con Estilo</title>
    <style>
        /* Selectores de CSS */
        body {
            background-color: #f4f4f4; /* Color de fondo hexadecimal */
            font-family: Arial, sans-serif; /* Tipografía segura */
            padding: 20px;
        }

        .encabezado-especial {
            color: #2c3e50;
            text-align: center; /* Alineación del texto */
            border-bottom: 2px solid blue; /* Borde inferior */
        }

        #contenedor-datos {
            background-color: white;
            padding: 15px; /* Margen interior */
            margin-top: 20px; /* Margen exterior superior */
            border-radius: 8px;
        }

        p {
            line-height: 1.6; /* Altura de línea para legibilidad */
        }
    </style>
</head>
<body>

    <h1 class="encabezado-especial">Aprendiendo HTML y CSS</h1>

    <div id="contenedor-datos">
        <p>HTML define qué elementos hay en la página (párrafos, títulos, div), y el CSS le dice al navegador cómo deben verse [1].</p>
        <p>En este ejemplo, hemos usado una <strong>clase</strong> para el título y un <strong>ID</strong> para el contenedor blanco.</p>
    </div>

</body>
</html>
